<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>융합 데이터 행정 통합 고도화 마스터 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="auth-stage" class="auth-stage">
        <div class="hufs-premium-login-card">
            <div class="hufs-logo">HUFS</div>
            <h2>행정업무 통합 대시보드</h2>
            <p class="subtitle">차이나데이터큐레이션전공 · 남수호 (2022304606)</p>
            
            <div class="manual-login-section">
                <label>시스템 접근 계정 (교수님 채점용)</label>
                <input type="email" id="prof-email" placeholder="이메일 입력">
                <input type="password" id="prof-pw" placeholder="비밀번호 입력">
                <button class="btn-primary-login" onclick="window.doLogin()">보안 전산망 접속</button>
            </div>
            <footer class="gate-bottom-copyright">© 2026 NAM SUHO. System Ready.</footer>
        </div>
    </div>

    <div id="dash-stage" class="screen-master-container hidden">
        </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
